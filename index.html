<!DOCTYPE html><html lang="vi"><head><link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"><link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"><link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"><link rel="manifest" href="/site.webmanifest"><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyWallet Dashboard by YINX</title><style>:root{--bg-color:#f4f7f6;--card-bg:rgba(255, 255, 255, 0.85);--primary:#2e7d32;--danger:#d32f2f;--text-main:#333333;--border:#e0e0e0;--result-bg:rgba(38, 50, 56, 0.9);--system-font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji"}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:var(--system-font)}body{background-image:url('backgroundphoto.jpg');background-repeat:repeat;background-size:150px;background-attachment:fixed;background-color:var(--bg-color);margin:0;padding:10px;min-height:100vh;line-height:1.5;color:var(--text-main)}.card{background:var(--card-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,.3);box-shadow:0 4px 15px rgba(0,0,0,.1);margin-bottom:15px}</style></head><body><div id="loader">⏳ ĐANG XỬ LÝ...</div><div class="main-container"><div class="left-panel"><div class="header-section"><h2>MyWallet</h2><div class="subtitle">Dashboard by YINX</div></div><div id="resultBox">Sẵn sàng!</div></div><div class="right-panel"><div class="tab-nav"><button class="tab-btn active" onclick='openTab(event,"tab-tongquan")'>📊 Tra cứu</button> <button class="tab-btn" onclick='openTab(event,"tab-vi")'>💰 Ví tiền</button> <button class="tab-btn" onclick='openTab(event,"tab-no")'>⏳ Nợ 50N</button> <button class="tab-btn" onclick='openTab(event,"tab-ketoan")'>📓 Kế toán</button></div><div id="tab-tongquan" class="tab-content active"><div class="card"><div class="card-title">Truy vấn dữ liệu</div><div class="btn-grid"><button class="action-btn" onclick='sendReq("readonly=true")'>SỐ DƯ</button> <button class="action-btn" onclick='sendReq("report=log")'>NHẬT KÝ</button> <button class="action-btn" onclick='sendReq("report=loan")'>KHOẢN VAY</button> <button class="action-btn" style="background:#455a64" onclick='sendReq("report=last2")'>XEM BẢNG</button></div></div></div><div id="tab-vi" class="tab-content"><div class="card"><div class="card-title">Cập nhật ví</div><div class="input-group"><label>🚗 Grab</label><input type="number" id="inpGrab" placeholder="Số tiền hoặc mã..."></div><div class="input-group"><label>💳 Timo</label><input type="number" id="inpTimo" placeholder="..."></div><div class="input-group"><label>💵 Tiền mặt</label><input type="number" id="inpVi" placeholder="..."></div><button class="btn-full" onclick="submitWallets()">🚀 CHỐT SỔ VÍ</button></div><div class="card"><div class="card-title">Chuyển nội bộ</div><div class="btn-grid" style="margin-bottom:12px"><select id="selFrom"><option value="1">Grab</option><option value="2">Timo</option><option value="3">Ví</option></select> <select id="selTo"><option value="2">Timo</option><option value="1">Grab</option><option value="3">Ví</option></select></div><input type="number" id="inpChuyenTien" placeholder="Số tiền..." style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;margin-bottom:10px"> <button class="action-btn btn-full" onclick="submitTransfer()">🚀 THỰC HIỆN CHUYỂN</button></div></div><div id="tab-no" class="tab-content"><div class="card"><div class="card-title">Sheet2</div><button class="btn-full" onclick='sendReq("danhdau=true")' style="height:80px">✅ XÁC NHẬN CHUYỂN HÔM NAY</button> <button class="danger-btn btn-full" onclick="confirmReset()" style="margin-top:20px">🔄 RESET CHU KỲ</button></div></div><div id="tab-ketoan" class="tab-content"><div class="card"><div class="card-title">Ghi nợ</div><div class="input-group"><label>💸 Trả luôn</label><input type="number" id="inpTraLuon" placeholder="Trừ tiền ngay"></div><div class="input-group"><label>📝 Trả sau</label><input type="number" id="inpTraSau" placeholder="Chỉ ghi nợ"></div><button class="warning-btn btn-full" onclick="submitAccounting()">⚡ XỬ LÝ KẾ TOÁN</button></div></div></div></div><script>const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx3H6ZBP77KEwMXfqdBgmpImVufFgQSAx8MtMrPxdGgp0pRYaHgvoaCji_HfvDbBMuuHQ/exec",resultBox=document.getElementById("resultBox"),loader=document.getElementById("loader");function openTab(e,t){let n=document.getElementsByClassName("tab-content");for(let e=0;e<n.length;e++)n[e].classList.remove("active");let o=document.getElementsByClassName("tab-btn");for(let e=0;e<o.length;e++)o[e].classList.remove("active");document.getElementById(t).classList.add("active"),e.currentTarget.classList.add("active")}function sendReq(e){loader.style.display="block",fetch(SCRIPT_URL+"?"+e).then(e=>e.text()).then(e=>{loader.style.display="none",resultBox.innerHTML=e,window.innerWidth<768&&window.scrollTo({top:0,behavior:"smooth"}),clearInputs()}).catch(e=>{loader.style.display="none",resultBox.innerHTML="❌ Lỗi: "+e})}function confirmReset(){confirm("Xác nhận reset chu kỳ nợ?")&&sendReq("danhdau=reset")}function submitWallets(){let e=[],t=document.getElementById("inpGrab").value,n=document.getElementById("inpTimo").value,o=document.getElementById("inpVi").value;t&&e.push("grab="+encodeURIComponent(t)),n&&e.push("timo="+encodeURIComponent(n)),o&&e.push("vi="+encodeURIComponent(o)),e.length?sendReq(e.join("&")):alert("Nhập số liệu!")}function submitTransfer(){let e=document.getElementById("selFrom").value,t=document.getElementById("selTo").value,n=document.getElementById("inpChuyenTien").value;if(!n||e==t)return alert("Kiểm tra lại ví và số tiền!");sendReq("chuyentien="+encodeURIComponent(e+t+n))}function submitAccounting(){let e=[],t=document.getElementById("inpTraLuon").value,n=document.getElementById("inpTraSau").value;t&&e.push("traluon="+encodeURIComponent(t)),n&&e.push("trasau="+encodeURIComponent(n)),e.length?sendReq(e.join("&")):alert("Nhập số liệu!")}function clearInputs(){document.querySelectorAll("input").forEach(e=>e.value="")}window.onload=()=>sendReq("readonly=true")</script></body></html>
