name: Deploy Project VCB1101 to Google

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      - name: Check for changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'mywallet.gs'
              - 'appsscript.json'
            frontend:
              - 'index.html'

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- PHẦN TỐI ƯU FRONTEND (GITHUB PAGES) ---
      - name: Minify HTML/JS for GitHub Pages
        if: steps.filter.outputs.frontend == 'true'
        run: |
          npm install -g html-minifier-terser
          html-minifier-terser --collapse-whitespace --remove-comments --minify-js true --minify-css true index.html -o index.html
          
      - name: Commit Minified HTML
        if: steps.filter.outputs.frontend == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "⚡ Optimize: Minify index.html for performance" || echo "No changes to commit"
          git push

      # --- PHẦN DEPLOY BACKEND (GOOGLE APP SCRIPT) ---
      - name: Install Clasp & Deploy Backend
        if: steps.filter.outputs.backend == 'true'
        run: |
          npm install -g @google/clasp
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"."}' > .clasp.json
          clasp push -f
          clasp deploy -i ${{ secrets.DEPLOYMENT_ID }} -d "Cập nhật logic hệ thống"

      - name: Final Status
        run: echo "Quy trình hoàn tất: Backend (${{ steps.filter.outputs.backend }}), Frontend (${{ steps.filter.outputs.frontend }})"
