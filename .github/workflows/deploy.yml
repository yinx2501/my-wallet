name: Deploy Project VCB1101 to Google

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      # Kiểm tra riêng sự thay đổi của file logic backend
      - name: Check for Backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'mywallet.gs'
              - 'appsscript.json'

      - name: Configure Node.js
        if: steps.filter.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Clasp
        if: steps.filter.outputs.backend == 'true'
        run: npm install -g @google/clasp

      - name: Set up Clasp credentials
        if: steps.filter.outputs.backend == 'true'
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Push to Google Apps Script
        if: steps.filter.outputs.backend == 'true'
        run: |
          clasp push -f
          clasp deploy -i ${{ secrets.DEPLOYMENT_ID }} -d "Cập nhật logic hệ thống"

      - name: Skip Message
        if: steps.filter.outputs.backend == 'false'
        run: echo "Chỉ có thay đổi giao diện, không cần cập nhật Google Backend."
